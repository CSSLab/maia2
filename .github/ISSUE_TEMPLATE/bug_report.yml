name: Bug report
description: Report a reproducible problem in Maia-2
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: >-
        Thanks for reporting a bug. Search existing issues first and remove
        credentials or private data from all logs.

  - type: input
    id: version
    attributes:
      label: Maia-2 version or commit
      placeholder: "0.11.0 or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - CPU
        - NVIDIA CUDA
        - Apple Silicon MPS
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python, PyTorch, accelerator, and dependency versions.
      render: text
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest self-contained example and exact commands.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and logs
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I removed credentials and private data from this report.
          required: true
